name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calcola nuovo tag (minor bump)
        id: version
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [[ -z "$LAST_TAG" ]]; then
            LAST_TAG="v0.0.0"
          fi
          MAJOR=$(echo "${LAST_TAG#v}" | cut -d. -f1)
          MINOR=$(echo "${LAST_TAG#v}" | cut -d. -f2)
          PATCH=$(echo "${LAST_TAG#v}" | cut -d. -f3)
          MINOR=$((MINOR + 1))
          PATCH=0
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Crea e pusha tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Crea zip traduzione
        run: zip -r "italian-translation-${{ steps.version.outputs.tag }}.zip" translated/ExampleLanguage/

      - name: Crea release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: italian-translation-${{ steps.version.outputs.tag }}.zip
          generate_release_notes: true
